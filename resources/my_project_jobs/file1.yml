resources:
  jobs:
    muralis_job:
      name: muralis_job_${bundle.target}

      email_notifications:
        on_failure:
          - ${var.notification_email}

      schedule:
        quartz_cron_expression: ${var.schedule_cron}
        timezone_id: UTC
        pause_status: ${var.schedule_pause_status}

      tasks:
        - task_key: run_notebook
          notebook_task:
            notebook_path: ../../src/my_project_code/file1.py
            base_parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}
              env: ${bundle.target}
